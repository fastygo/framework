# golangci-lint v2 configuration for github.com/fastygo/framework.
#
# Phase 1 minimum viable set: catches concurrency, context, and resource
# bugs without drowning the team in style noise.
#
# Requires golangci-lint >= v2.4.0 (Go 1.25 support — official binaries
# below v2.4 are built with Go 1.24 and refuse to lint a go1.25 module).
# CI pins v2.11; bump the version in .github/workflows/ci.yml when raising
# this floor.

version: "2"

linters:
  default: none
  enable:
    # Defaults worth keeping (gosimple + stylecheck are now folded into staticcheck in v2).
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused

    # Security and resource hygiene
    - gosec
    - bodyclose

    # Context and error handling
    - contextcheck
    - noctx
    - nilerr
    - errorlint

    # Light style/correctness
    - gocritic

  settings:
    govet:
      enable-all: true
      disable:
        # fieldalignment is too aggressive for v0.x APIs; revisit later.
        - fieldalignment

    gosec:
      excludes:
        # G404 (math/rand) is fine in tests and worker jitter.
        - G404

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy

  exclusions:
    # Keep v1 behavior: skip standard generated-file headers, plus our own.
    generated: lax
    rules:
      # Tests may use fmt.Sprintf for table-driven names without security risk.
      - path: _test\.go
        linters:
          - gosec

      # Generated templ files are not our code.
      - path: _templ\.go
        linters:
          - errcheck
          - gosec
          - gocritic
          - staticcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
