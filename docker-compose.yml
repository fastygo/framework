services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: framework-paas
    env_file:
      - .env
    environment:
      APP_BIND: "0.0.0.0:80"
      APP_STATIC_DIR: "static"
      APP_DEFAULT_LOCALE: "en"
      APP_AVAILABLE_LOCALES: "en,ru"
      APP_DATA_SOURCE: "fixture"
      OIDC_ISSUER: ${OIDC_ISSUER:-https://idp.example.com}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-myapp}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-https://app.example.com/auth/callback}
      SESSION_KEY: ${SESSION_KEY}
    expose:
      - "80"
    restart: unless-stopped
