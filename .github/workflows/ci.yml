name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  framework:
    name: framework / lint+test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Disable workspace
        run: echo "GOWORK=off" >> $GITHUB_ENV

      - name: Download dependencies
        run: go mod download

      - name: Run lint + tests
        run: make ci

      - name: Coverage gate (per-package thresholds)
        run: make coverage-gate

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-profile
          path: coverage.out
          retention-days: 7

      - name: go vet (Go 1.25 analyzers waitgroup, hostport)
        run: go vet ./...

      - name: golangci-lint
        # v9 is the first action major that ships golangci-lint v2 by default.
        # v2.4+ is required for Go 1.25 (older binaries are built with Go 1.24).
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  examples:
    name: build examples
    runs-on: ubuntu-latest
    needs: framework
    strategy:
      fail-fast: false
      matrix:
        example: [landing, web, blog, docs, dashboard]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

      - name: Generate templ for example
        working-directory: examples/${{ matrix.example }}
        run: templ generate ./...

      - name: Build example
        working-directory: examples/${{ matrix.example }}
        run: |
          go mod download
          go build ./...
