name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  framework:
    name: framework / lint+test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Disable workspace
        run: echo "GOWORK=off" >> $GITHUB_ENV

      - name: Download dependencies
        run: go mod download

      - name: Run tests and vet
        run: make lint-ci

      - name: Coverage gate (per-package thresholds)
        run: make coverage-gate

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-profile
          path: coverage.out
          retention-days: 7

      - name: go vet (Go 1.25 analyzers waitgroup, hostport)
        run: go vet ./...

      - name: golangci-lint
        # v9 is the first action major that ships golangci-lint v2 by default.
        # v2.4+ is required for Go 1.25 (older binaries are built with Go 1.24).
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  examples:
    name: build examples
    runs-on: ubuntu-latest
    needs: framework
    strategy:
      fail-fast: false
      matrix:
        example: [landing, web, blog, docs, dashboard, instant]
    steps:
      - uses: actions/checkout@v4
        with:
          path: framework

      - uses: actions/checkout@v4
        with:
          repository: fastygo/ui8kit
          path: '@UI8Kit'

      - uses: actions/checkout@v4
        with:
          repository: fastygo/blocks
          path: Blocks

      - uses: actions/checkout@v4
        with:
          repository: fastygo/elements
          path: Elements

      - uses: actions/setup-go@v5
        with:
          go-version-file: framework/go.mod

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install workspace JS dependencies
        working-directory: framework
        run: bun install

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

      - name: Build example assets
        working-directory: framework/examples/${{ matrix.example }}
        run: bun run build

      - name: Build example
        working-directory: framework/examples/${{ matrix.example }}
        run: |
          go mod download
          go build ./...
